name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-Linux-macOS:
    name: Build on ${{ matrix.os }}
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install tools (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt -qq update
          sudo apt -qq install gcc-multilib libc6-dev-i386

      - name: Restore musl i486 extracted cache (Ubuntu)
        id: musl-cache-bin
        if: startsWith(matrix.os, 'ubuntu-')
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.musl-toolchain/i486-linux-musl-cross
          key: musl-i486-bin-v0.0.1-1b7eceb2022f4a664028dd314c5c44332b601bd271e40f0934b4bc8fd3b0fcf5

      - name: Validate musl i486 extracted cache (Ubuntu)
        id: musl-cache-bin-validate
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          set -euo pipefail
          musl_root="${GITHUB_WORKSPACE}/.musl-toolchain/i486-linux-musl-cross"
          musl_gcc="${musl_root}/bin/i486-linux-musl-gcc"
          if [ "${{ steps.musl-cache-bin.outputs.cache-hit }}" = 'true' ] \
              && [ -x "${musl_gcc}" ]; then
            echo "cache-valid=true" >> "${GITHUB_OUTPUT}"
          else
            if [ "${{ steps.musl-cache-bin.outputs.cache-hit }}" = 'true' ]; then
              rm -rf "${musl_root}"
              echo "Cached musl toolchain is missing ${musl_gcc}." >&2
            fi
            echo "cache-valid=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Restore musl i486 archive cache (Ubuntu)
        id: musl-cache-archive
        if: startsWith(matrix.os, 'ubuntu-') && steps.musl-cache-bin-validate.outputs.cache-valid != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/i486-linux-musl-cross.tgz
          key: musl-i486-archive-v0.0.1-1b7eceb2022f4a664028dd314c5c44332b601bd271e40f0934b4bc8fd3b0fcf5

      - name: Prepare musl.cc i486 toolchain (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-') && steps.musl-cache-bin-validate.outputs.cache-valid != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MUSL_ROOT="${GITHUB_WORKSPACE}/.musl-toolchain"
          MUSL_ARCHIVE="${RUNNER_TEMP}/i486-linux-musl-cross.tgz"
          MUSL_ARTIFACT_NAME="musl-i486-toolchain-${{ matrix.os }}"
          MUSL_ARCHIVE_URL="https://github.com/musl-cc/musl.cc/releases/download/v0.0.1/i486-linux-musl-cross.tgz"
          MUSL_ARCHIVE_SHA256="1b7eceb2022f4a664028dd314c5c44332b601bd271e40f0934b4bc8fd3b0fcf5"

          if [ ! -s "${MUSL_ARCHIVE}" ]; then
            curl -fL \
                "${MUSL_ARCHIVE_URL}" \
                -o "${MUSL_ARCHIVE}" \
                || true
          fi

          if [ ! -s "${MUSL_ARCHIVE}" ]; then
            artifact_api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100"
            artifact_json="${RUNNER_TEMP}/musl-i486-artifacts.json"
            artifact_zip="${RUNNER_TEMP}/musl-i486-artifact.zip"
            artifact_archive="${RUNNER_TEMP}/i486-linux-musl-cross.from-artifact.tgz"
            artifact_download_url=""
            if curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${artifact_api_url}" \
                -o "${artifact_json}"; then
              artifact_download_url="$(python3 -c 'import json, sys; payload = json.load(open(sys.argv[1], "r", encoding="utf-8")); artifact_name = sys.argv[2]; artifacts = [a for a in payload.get("artifacts", []) if a.get("name") == artifact_name and not a.get("expired")]; artifacts.sort(key=lambda a: a.get("created_at", ""), reverse=True); print(artifacts[0].get("archive_download_url", "") if artifacts else "")' "${artifact_json}" "${MUSL_ARTIFACT_NAME}")"
            fi
            if [ -n "${artifact_download_url}" ]; then
              curl -fL \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "${artifact_download_url}" \
                  -o "${artifact_zip}"
              rm -f "${artifact_archive}"
              if unzip -Z -1 "${artifact_zip}" | grep -qx "i486-linux-musl-cross.tgz"; then
                if unzip -p "${artifact_zip}" i486-linux-musl-cross.tgz > "${artifact_archive}"; then
                  mv -f "${artifact_archive}" "${MUSL_ARCHIVE}"
                else
                  rm -f "${artifact_archive}"
                  echo "Failed to extract i486-linux-musl-cross.tgz from artifact." >&2
                fi
              else
                echo "Artifact is missing i486-linux-musl-cross.tgz entry." >&2
              fi
            else
              echo "No non-expired ${MUSL_ARTIFACT_NAME} artifact available." >&2
            fi
          fi

          test -s "${MUSL_ARCHIVE}"
          printf '%s  %s\n' "${MUSL_ARCHIVE_SHA256}" "${MUSL_ARCHIVE}" \
              | sha256sum -c -
          rm -rf "${MUSL_ROOT}"
          mkdir -p "${MUSL_ROOT}"
          tar -xzf "${MUSL_ARCHIVE}" -C "${MUSL_ROOT}"
          test -x "${MUSL_ROOT}/i486-linux-musl-cross/bin/i486-linux-musl-gcc"

      - name: Upload musl i486 toolchain artifact backup (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-') && github.event_name != 'pull_request' && steps.musl-cache-bin-validate.outputs.cache-valid != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: musl-i486-toolchain-${{ matrix.os }}
          path: ${{ runner.temp }}/i486-linux-musl-cross.tgz
          retention-days: 90

      - name: Build and test
        run: |
          for compiler in gcc clang; do
            rm -rf build
            cmake -DCMAKE_C_COMPILER="${compiler}" \
                -DCMAKE_BUILD_TYPE=Release \
                -B build
            cmake --build build
          done
          rm -rf build

          if [[ "${{ matrix.os }}" == ubuntu-* ]]; then
            # Ubuntu
            cmake -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-m32" \
                -DCMAKE_EXE_LINKER_FLAGS="-static" \
                -B build
            cmake --build build
            rm -rf build

            # Use i486 baseline ISA + static musl for broad compatibility with
            # very old x86 hardware and older Linux environments.
            # --gc-sections removes unused sections; -s strips symbols to keep
            # release binaries smaller.
            cmake \
                -DCMAKE_C_COMPILER="${GITHUB_WORKSPACE}/.musl-toolchain/i486-linux-musl-cross/bin/i486-linux-musl-gcc" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=i486 -mtune=generic -O2 -ffunction-sections -fdata-sections" \
                -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -Wl,--gc-sections -s" \
                -B build
          else
            # macOS
            cmake -DCMAKE_C_COMPILER=clang \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
                -B build
          fi
          cmake --build build

          random_folder="$(mktemp -u $(printf 'X%.0s' $(seq 1 255)))"
          mkdir -p "./tests/${random_folder}"
          random_file="$(mktemp -u $(printf 'X%.0s' $(seq 1 255)))"
          random_path="./tests/${random_folder}/${random_file}"
          cp -f ./build/tests/cpulimit_test "${random_path}"
          echo "${random_path}"
          sudo "${random_path}"

          cp -f ./build/src/cpulimit \
              ./build/src/cpulimit-${{ matrix.os }}

      - name: Upload binary artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@main
        with:
          name: cpulimit-${{ matrix.os }}
          path: build/src/cpulimit-${{ matrix.os }}

  build-FreeBSD:
    name: Build on FreeBSD-${{ matrix.osver }}-${{ matrix.arch }}
    permissions:
      contents: read
    strategy:
      matrix:
        osver: ["13.5", "14.3"]
        arch: ["x86_64", "aarch64"]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.osver }}
          arch: ${{ matrix.arch }}
          usesh: true
          prepare: |
            pkg install -y -q gcc llvm sudo cmake

          run: |
            for compiler in gcc clang; do
              rm -rf build
              cmake -DCMAKE_C_COMPILER="${compiler}" \
                  -DCMAKE_BUILD_TYPE=Release \
                  -B build
              cmake --build build
            done
            rm -rf build

            cmake -DCMAKE_C_COMPILER=clang \
                -DCMAKE_BUILD_TYPE=Release \
                -B build
            cmake --build build

            random_folder="$(mktemp -u $(printf 'X%.0s' $(seq 1 255)))"
            mkdir -p "./tests/${random_folder}"
            random_file="$(mktemp -u $(printf 'X%.0s' $(seq 1 255)))"
            random_path="./tests/${random_folder}/${random_file}"
            cp -f ./build/tests/cpulimit_test "${random_path}"
            echo "${random_path}"
            sudo "${random_path}"

            cp -f ./build/src/cpulimit \
                ./build/src/cpulimit-FreeBSD-${{ matrix.osver }}-${{ matrix.arch }}

      - name: Upload binary artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@main
        with:
          name: cpulimit-FreeBSD-${{ matrix.osver }}-${{ matrix.arch }}
          path: build/src/cpulimit-FreeBSD-${{ matrix.osver }}-${{ matrix.arch }}

  upload-releases:
    needs: [build-Linux-macOS, build-FreeBSD]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main

      - id: version
        shell: bash
        run: |
          v=$(TZ=Asia/Shanghai git log -1 --format="%cd" --date=format-local:'%Y%m%d%H%M')
          echo "release_version=$v" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@main
        with:
          pattern: cpulimit-*
          merge-multiple: true
          path: artifacts/

      - name: Upload binaries to release
        uses: HiGarfield/action-gh-release@master
        with:
          tag_name: ${{ steps.version.outputs.release_version }}
          files: artifacts/*
          make_latest: true
          overwrite_files: true

  cleanup-releases:
    needs: [upload-releases]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: HiGarfield/delete-release-action@master
        continue-on-error: true
        with:
          release-drop: true
          release-keep-count: 0
          release-drop-tag: true
          pre-release-drop: true
          pre-release-keep-count: -1
          pre-release-drop-tag: true
          draft-drop: true
          draft-drop-count: -1
        env:
          GITHUB_TOKEN: ${{ github.token }}

  sync-branch:
    needs: [cleanup-releases]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: HiGarfield/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: develop
          force: true
